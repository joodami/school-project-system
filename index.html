<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการโครงการโรงเรียน</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container mt-5">
        <header class="text-center mb-5">
            <h1 class="fw-bold">Dashboard ระบบโครงการ</h1>
            <p class="text-muted">โรงเรียนพิมานพิทยาสรรค์</p>
        </header>

        <div class="row mb-4 text-center">
            <div class="col-md-4">
                <div class="card stat-card shadow-sm">
                    <div class="card-body">
                        <h5>โครงการทั้งหมด</h5>
                        <h2 id="totalProjects">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card shadow-sm border-success">
                    <div class="card-body">
                        <h5>รายงานแล้ว</h5>
                        <h2 id="reportedCount" class="text-success">-</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card stat-card shadow-sm border-warning">
                    <div class="card-body">
                        <h5>รอดำเนินการ</h5>
                        <h2 id="pendingCount" class="text-warning">-</h2>
                    </div>
                </div>
            </div>
        </div>

        <div class="card shadow-sm p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h4 class="mb-0">รายการโครงการล่าสุด</h4>
                <button class="btn btn-primary">เพิ่มโครงการใหม่ +</button>
            </div>
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>ชื่อโครงการ</th>
                            <th>กลุ่มงาน/สาระ</th>
                            <th>งบประมาณ</th>
                            <th>สถานะ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="projectTableBody">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
